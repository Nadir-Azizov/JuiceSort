<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuiceSort Roadmap v10d</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1a2e;font-family:'Fredoka',sans-serif;display:flex;justify-content:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;border-radius:44px;border:5px solid #222;overflow:hidden;position:relative;
  box-shadow:0 0 0 2px #444,0 30px 80px rgba(0,0,0,0.6)}
.scroll{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative}
.scroll::-webkit-scrollbar{display:none}
.ocean{position:relative;width:100%;display:flex;flex-direction:column-reverse;
  background:linear-gradient(180deg,#87CEEB 0%,#4DD8FF 6%,#22c1e8 12%,#1499c7 25%,#0e94c8 45%,#0a7db0 65%,#085a7d 85%,#064a68 100%);
  padding:40px 0 30px}
.ocean::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80px 25px at 15% 12%,rgba(255,255,255,0.07) 0%,transparent 100%),
    radial-gradient(ellipse 60px 20px at 72% 8%,rgba(255,255,255,0.05) 0%,transparent 100%),
    radial-gradient(ellipse 90px 18px at 35% 25%,rgba(255,255,255,0.04) 0%,transparent 100%),
    radial-gradient(ellipse 70px 22px at 60% 45%,rgba(255,255,255,0.05) 0%,transparent 100%);
  pointer-events:none;animation:caustics 6s ease-in-out infinite alternate;z-index:0}
@keyframes caustics{0%{opacity:.5}100%{opacity:1}}

.hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:390px;
  padding:48px 20px 16px;z-index:100;border-radius:44px 44px 0 0;
  background:linear-gradient(180deg,rgba(8,50,75,0.95) 0%,rgba(8,50,75,0.6) 80%,transparent 100%)}
.hdr-inner{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:22px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.hdr-stars{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#fff;
  background:rgba(0,0,0,0.4);padding:6px 14px;border-radius:20px;border:2px solid rgba(255,215,0,0.5)}

.bg{position:absolute;pointer-events:none;z-index:1}
.cloud{opacity:.5;animation:drift 20s ease-in-out infinite}
.cloud:nth-child(2){animation-duration:25s;animation-direction:reverse;opacity:.35}
.cloud:nth-child(3){animation-duration:22s;animation-delay:4s;opacity:.3}
@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(20px)}}
.cliff{opacity:.9;z-index:2}

.level-row{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:4px 0}
.level-row.L{align-self:flex-start;margin-left:20px}
.level-row.R{align-self:flex-end;margin-right:20px}
.level-row.C{align-self:center}

.isle-wrap{position:relative;display:flex;flex-direction:column;align-items:center}

.isle{width:150px;filter:drop-shadow(0 5px 10px rgba(0,0,0,0.3));transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
.isle:hover{transform:scale(1.06)}
.level-row.boss .isle{width:200px}
.level-row.locked .isle{width:130px}
.level-row.now .isle{width:195px;filter:drop-shadow(0 5px 15px rgba(232,85,208,0.5))}
.flip{transform:scaleX(-1)}.flip:hover{transform:scaleX(-1) scale(1.06)}
.locked-boss{filter:grayscale(0.4) brightness(0.6) drop-shadow(0 5px 10px rgba(0,0,0,0.3));opacity:0.7}

.glow{position:absolute;width:220px;height:140px;top:45%;left:50%;transform:translate(-50%,-55%);
  background:radial-gradient(ellipse,rgba(232,85,208,0.25) 0%,rgba(232,85,208,0.1) 40%,transparent 70%);
  border-radius:50%;animation:glowPulse 2s ease-in-out infinite;pointer-events:none;z-index:-1}
@keyframes glowPulse{0%,100%{opacity:.7;transform:translate(-50%,-55%) scale(1)}50%{opacity:1;transform:translate(-50%,-55%) scale(1.15)}}

/* FIX 1: Stars moved UP with negative margin on bottom of island */
.stars{display:flex;gap:3px;z-index:16;margin-top:-18px}
.star{width:22px;height:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))}
.star.e{opacity:.5;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))}

/* FIX 3: Badge moved higher — more negative margin so it overlaps island bottom edge */
.badge{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.35);
  margin-top:-6px;position:relative;z-index:15;cursor:pointer;transition:transform 0.15s}
.badge:hover{transform:scale(1.1)}
.badge::before{content:'';position:absolute;top:0;left:0;right:0;height:46%;
  background:linear-gradient(180deg,rgba(255,255,255,0.28) 0%,transparent 100%);
  border-radius:50% 50% 40% 40%;pointer-events:none}

.badge.done{background:linear-gradient(145deg,#e855d0,#c22aa8,#9c1e88);
  border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 4px 0 #7a1568,0 6px 16px rgba(194,42,168,0.35),inset 0 2px 3px rgba(255,255,255,0.2)}
.badge.now{background:linear-gradient(145deg,#ff70f0,#e855d0,#c22aa8);
  border:3px solid rgba(255,255,255,0.6);
  box-shadow:0 4px 0 #9c1e88,0 0 22px rgba(232,85,208,0.7),0 0 44px rgba(232,85,208,0.3),inset 0 2px 3px rgba(255,255,255,0.3);
  animation:btnPulse 2s ease-in-out infinite;width:62px;height:62px;font-size:26px}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 0 #9c1e88,0 0 22px rgba(232,85,208,0.7),0 0 44px rgba(232,85,208,0.3),inset 0 2px 3px rgba(255,255,255,0.3)}
  50%{box-shadow:0 4px 0 #9c1e88,0 0 35px rgba(232,85,208,1),0 0 70px rgba(232,85,208,0.5),inset 0 2px 3px rgba(255,255,255,0.3)}}
.badge.locked{background:linear-gradient(145deg,#8a95a7,#6a7789,#525f70);
  border:2px solid rgba(255,255,255,0.12);
  box-shadow:0 4px 0 #3d4854,0 6px 10px rgba(0,0,0,0.25),inset 0 2px 3px rgba(255,255,255,0.08)}
.badge.boss-done{background:linear-gradient(145deg,#ffd700,#e8a800,#c48800);
  border:3.5px solid rgba(255,255,255,0.6);
  box-shadow:0 4px 0 #8a6000,0 6px 20px rgba(255,215,0,0.35),inset 0 2px 3px rgba(255,255,255,0.25);
  width:62px;height:62px;font-size:26px}

/* Stones — z above islands */
.stones-wrap{width:100%;height:110px;position:relative;z-index:11;margin:-12px 0}
.stones-svg{width:100%;height:100%;overflow:visible}
.stone-circle{fill:rgba(170,155,135,0.75);stroke:rgba(130,115,95,0.4);stroke-width:1}
.stone-highlight{fill:rgba(215,200,178,0.55)}
.stone-moss{fill:rgba(110,165,55,0.5)}
.stone-water{fill:rgba(50,190,225,0.18);stroke:none}
.stone-shadow{fill:rgba(30,60,80,0.22);stroke:none}
.stone-dim .stone-circle{fill:rgba(80,100,120,0.25);stroke:rgba(60,80,100,0.15)}
.stone-dim .stone-highlight,.stone-dim .stone-moss,.stone-dim .stone-water,.stone-dim .stone-shadow{opacity:0.3}
.lock-svg{width:18px;height:18px;fill:rgba(255,255,255,0.65)}
</style>
</head>
