<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JuiceSort Hub Screen Mockup v2</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #111; font-family: 'Fredoka', sans-serif;
  }
  .phone-frame {
    width: 360px; height: 780px; border-radius: 40px;
    overflow: hidden; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 3px solid #333;
  }
  .screen {
    width: 100%; height: 100%;
    background: linear-gradient(180deg,
      #0a2e0a 0%, #0e3d15 15%, #145525 32%, #1a6b30 46%,
      #22853e 58%, #2a9f4a 70%, #35b858 80%, #45d068 88%, #60e880 100%);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  /* Warm ambient */
  .screen::before {
    content: ''; position: absolute;
    bottom: -15%; left: -15%; width: 130%; height: 50%;
    background: radial-gradient(ellipse, rgba(255,150,50,0.15) 0%, transparent 60%);
    animation: warmG 5s ease-in-out infinite;
  }
  @keyframes warmG { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }

  /* ========== SPARKLE STARS ========== */
  .glow-spark {
    position: absolute; border-radius: 50%; z-index: 2;
    animation: glowF ease-in-out infinite;
  }
  .glow-spark::before, .glow-spark::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.9); border-radius: 1px;
  }
  .glow-spark::before { width: 2px; height: 100%; left: calc(50% - 1px); top: 0; }
  .glow-spark::after { width: 100%; height: 2px; top: calc(50% - 1px); left: 0; }
  .gs1 { width: 10px; height: 10px; top: 15%; left: 20%; animation-duration: 3s; animation-delay: 0.3s; }
  .gs2 { width: 8px; height: 8px; top: 25%; right: 18%; animation-duration: 2.5s; animation-delay: 1s; }
  .gs3 { width: 12px; height: 12px; top: 40%; left: 12%; animation-duration: 3.5s; animation-delay: 0.8s; }
  .gs4 { width: 7px; height: 7px; top: 50%; right: 15%; animation-duration: 2.8s; animation-delay: 1.8s; }
  .gs5 { width: 9px; height: 9px; top: 35%; left: 55%; animation-duration: 3.2s; animation-delay: 0.5s; }
  .gs6 { width: 6px; height: 6px; top: 60%; right: 30%; animation-duration: 2.2s; animation-delay: 2.2s; }
  .gs7 { width: 8px; height: 8px; top: 18%; left: 65%; animation-duration: 2.6s; animation-delay: 1.3s; }
  .gs8 { width: 10px; height: 10px; top: 70%; left: 25%; animation-duration: 3s; animation-delay: 0.7s; }
  .gs9 { width: 7px; height: 7px; top: 45%; right: 40%; animation-duration: 2.4s; animation-delay: 1.6s; }
  @keyframes glowF {
    0%,100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    30% { opacity: 0.9; transform: scale(1) rotate(20deg); }
    60% { opacity: 0.4; transform: scale(0.7) rotate(40deg); }
  }

  /* ========== BOKEH ========== */
  .bokeh { position: absolute; border-radius: 50%; animation: floatB ease-in-out infinite; z-index: 0; }
  .b1 { width: 140px; height: 140px; top: 10%; left: -5%;
    background: radial-gradient(circle, rgba(255,180,80,0.14) 0%, transparent 70%); animation-duration: 7s; }
  .b2 { width: 100px; height: 100px; top: 30%; right: 5%;
    background: radial-gradient(circle, rgba(200,120,255,0.12) 0%, transparent 70%); animation-duration: 5s; animation-delay: 1.5s; }
  .b3 { width: 80px; height: 80px; top: 55%; left: 15%;
    background: radial-gradient(circle, rgba(255,100,150,0.1) 0%, transparent 70%); animation-duration: 8s; animation-delay: 3s; }
  @keyframes floatB {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-15px) scale(1.1); opacity: 0.65; }
  }

  /* ========== BUBBLES ========== */
  .bubble {
    position: absolute; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent);
    animation: rise linear infinite; z-index: 0;
  }
  .bu1 { width: 8px; height: 8px; bottom: -10px; left: 22%; animation-duration: 8s; }
  .bu2 { width: 6px; height: 6px; bottom: -8px; left: 55%; animation-duration: 10s; animation-delay: 2s; }
  .bu3 { width: 10px; height: 10px; bottom: -12px; left: 75%; animation-duration: 9s; animation-delay: 4s; }
  @keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.4; } 90% { opacity: 0.15; }
    100% { transform: translateY(-800px); opacity: 0; }
  }

  /* ========== TOP BAR ========== */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 50px 20px 10px 20px; z-index: 5;
  }
  .coin-display {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.4); padding: 6px 14px 6px 8px;
    border-radius: 20px; border: 1.5px solid rgba(255,200,50,0.4);
    box-shadow: 0 0 12px rgba(255,200,50,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .coin-icon {
    width: 26px; height: 26px;
    background: radial-gradient(circle at 40% 35%, #ffe866, #f5a623);
    border-radius: 50%; border: 2px solid #cc8800;
    font-size: 13px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    color: #8B6914;
    box-shadow: 0 0 8px rgba(255,200,50,0.4);
    animation: coinPulse 2s ease-in-out infinite;
  }
  @keyframes coinPulse { 0%,100% { box-shadow: 0 0 8px rgba(255,200,50,0.3); } 50% { box-shadow: 0 0 16px rgba(255,200,50,0.6); } }
  .coin-amount { color: #ffe066; font-weight: 700; font-size: 17px;
    text-shadow: 0 0 8px rgba(255,220,50,0.3); }
  .settings-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, rgba(100,80,160,0.6), rgba(70,50,130,0.5));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    border: 1.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 10px rgba(140,100,220,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    cursor: pointer;
  }

  /* ========== CENTER AREA ========== */
  .center-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 3; padding: 10px 20px;
  }
  .scene-title {
    font-size: 16px; color: rgba(255,235,200,0.5); font-weight: 500;
    letter-spacing: 2px; margin-bottom: 4px; text-transform: uppercase;
  }
  .city-name {
    font-family: 'Baloo 2', sans-serif;
    font-size: 30px; color: #fff; font-weight: 900;
    text-shadow: 0 2px 15px rgba(0,0,0,0.4), 0 0 20px rgba(255,200,100,0.15);
    -webkit-text-stroke: 0.5px rgba(255,255,255,0.3);
    margin-bottom: 25px;
  }

  /* Decorative bottles */
  .scene-bottles { display: flex; gap: 14px; margin-bottom: 35px; }
  .scene-bottle {
    width: 26px; height: 68px; border-radius: 5px 5px 12px 12px;
    border: 1.5px solid rgba(255,255,255,0.15);
    position: relative; overflow: hidden;
    background: rgba(255,255,255,0.03);
    animation: bottleFloat 4s ease-in-out infinite;
  }
  .scene-bottle:nth-child(1) { animation-delay: 0s; }
  .scene-bottle:nth-child(2) { animation-delay: 0.5s; }
  .scene-bottle:nth-child(3) { animation-delay: 1s; }
  .scene-bottle:nth-child(4) { animation-delay: 1.5s; }
  @keyframes bottleFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .scene-bottle::before {
    content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 7px; border-radius: 3px 3px 0 0;
    border: 1.5px solid rgba(255,255,255,0.15); border-bottom: none;
  }
  .sl { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 0 0 10px 10px; }
  .sl::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.2); border-radius: 50%; }
  .scene-bottle:nth-child(1) .sl { height: 78%; background: linear-gradient(180deg, #ffcc44, #f5a50c); }
  .scene-bottle:nth-child(2) .sl { height: 60%; background: linear-gradient(180deg, #aa2266, #8c1459); }
  .scene-bottle:nth-child(3) .sl { height: 85%; background: linear-gradient(180deg, #33ddbb, #19b8a6); }
  .scene-bottle:nth-child(4) .sl { height: 50%; background: linear-gradient(180deg, #ff88a0, #eb6b85); }
  /* Bottle sparkle */
  .scene-bottle .bsp {
    position: absolute; width: 5px; height: 5px;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 70%);
    border-radius: 50%; animation: sparkPop 2s ease-in-out infinite;
  }
  .scene-bottle:nth-child(1) .bsp { top: 8px; left: 4px; animation-delay: 0.3s; }
  .scene-bottle:nth-child(2) .bsp { top: 20px; right: 3px; animation-delay: 1.2s; }
  .scene-bottle:nth-child(3) .bsp { top: 5px; left: 5px; animation-delay: 0.8s; }
  .scene-bottle:nth-child(4) .bsp { top: 25px; left: 4px; animation-delay: 1.8s; }
  @keyframes sparkPop { 0%,100% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.3); } }

  /* ========== PLAY BUTTON (shiny, juicy, tasty!) ========== */
  .play-wrapper {
    position: relative; z-index: 5;
  }
  /* Glow behind button */
  .play-glow {
    position: absolute; top: -20px; left: -30px; right: -30px; bottom: -20px;
    background: radial-gradient(ellipse, rgba(80,210,100,0.35) 0%, transparent 70%);
    border-radius: 50%;
    animation: btnGlow 2s ease-in-out infinite;
  }
  @keyframes btnGlow { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

  .play-button {
    width: 270px; height: 76px; position: relative;
    background: linear-gradient(180deg, #66ee77 0%, #44dd55 30%, #33cc44 60%, #28b83d 100%);
    border-radius: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow:
      0 5px 0 #1e8835,
      0 7px 0 #166b28,
      0 10px 30px rgba(0,0,0,0.35),
      inset 0 3px 0 rgba(255,255,255,0.35),
      inset 0 -2px 0 rgba(0,0,0,0.1),
      0 0 25px rgba(80,220,100,0.3);
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.1s;
    overflow: hidden;
  }
  .play-button:hover { transform: scale(1.04); }

  /* Shine sweep across button */
  .play-button::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: btnShine 2.5s ease-in-out infinite;
    border-radius: 38px;
  }
  @keyframes btnShine { 0% { left: -50%; } 35% { left: 120%; } 100% { left: 120%; } }

  /* Top highlight */
  .play-button::after {
    content: ''; position: absolute;
    top: 4px; left: 20px; right: 20px; height: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
    border-radius: 20px;
  }

  .play-text {
    font-family: 'Baloo 2', sans-serif;
    font-size: 32px; font-weight: 800; color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.2);
    letter-spacing: 2px; z-index: 1;
  }

  /* Play button sparkles */
  .btn-spark {
    position: absolute; z-index: 2;
    animation: btnSparkle 1.5s ease-in-out infinite;
  }
  .btn-spark::before, .btn-spark::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.9); border-radius: 1px;
  }
  .btn-spark::before { width: 2px; height: 100%; left: calc(50% - 1px); }
  .btn-spark::after { width: 100%; height: 2px; top: calc(50% - 1px); }
  .bks1 { width: 10px; height: 10px; top: 8px; left: 30px; animation-delay: 0.3s; }
  .bks2 { width: 8px; height: 8px; top: 12px; right: 40px; animation-delay: 0.9s; }
  .bks3 { width: 7px; height: 7px; bottom: 10px; left: 60px; animation-delay: 1.5s; }
  .bks4 { width: 9px; height: 9px; bottom: 8px; right: 55px; animation-delay: 0.6s; }
  @keyframes btnSparkle {
    0%,100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    40% { opacity: 1; transform: scale(1) rotate(25deg); }
    70% { opacity: 0; transform: scale(0.5) rotate(45deg); }
  }

  .tap-hint {
    margin-top: 16px; color: rgba(255,235,200,0.35);
    font-size: 12px; font-weight: 500; letter-spacing: 2px;
    animation: pulse 2.5s ease-in-out infinite; z-index: 3;
  }
  @keyframes pulse { 0%,100% { opacity: 0.25; } 50% { opacity: 0.6; } }

  /* ========== BOTTOM NAV (shiny) ========== */
  .bottom-nav {
    display: flex; justify-content: space-around; align-items: flex-end;
    padding: 8px 10px 28px 10px;
    background: linear-gradient(180deg, transparent 0%, rgba(20,10,40,0.85) 40%, rgba(20,10,40,0.95) 100%);
    z-index: 5;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; opacity: 0.35; transition: opacity 0.2s;
  }
  .nav-item.active { opacity: 1; }
  .nav-item:hover { opacity: 0.6; }
  .nav-icon {
    width: 46px; height: 46px; position: relative;
    background: linear-gradient(135deg, rgba(100,80,160,0.6), rgba(70,50,130,0.5));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    border: 1.5px solid rgba(255,255,255,0.12);
  }
  .nav-item.active .nav-icon {
    background: linear-gradient(135deg, rgba(160,120,240,0.8), rgba(120,80,200,0.7));
    border-color: rgba(255,200,50,0.5);
    box-shadow: 0 0 18px rgba(140,100,220,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .nav-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }
  .nav-item.active .nav-label { color: #ffe066; text-shadow: 0 0 8px rgba(255,220,50,0.3); }
  .soon-badge {
    position: absolute; top: -5px; right: -5px;
    background: linear-gradient(135deg, #ff5577, #ee3355);
    color: #fff; font-size: 7px; font-weight: 700;
    padding: 2px 5px; border-radius: 6px; letter-spacing: 0.5px;
    box-shadow: 0 2px 6px rgba(255,50,80,0.3);
  }

  /* Active nav glow */
  .nav-item.active .nav-icon::after {
    content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
    border-radius: 18px;
    background: radial-gradient(circle, rgba(140,100,220,0.2) 0%, transparent 70%);
    animation: navGlow 2s ease-in-out infinite;
  }
  @keyframes navGlow { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

  /* Roadmap button */
  .roadmap-btn {
    position: absolute; top: 110px; right: 20px;
    width: 46px; height: 46px;
    background: linear-gradient(135deg, rgba(100,80,160,0.6), rgba(70,50,130,0.5));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    border: 1.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 10px rgba(140,100,220,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    cursor: pointer; z-index: 5;
  }

  .mockup-label {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #555; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="mockup-label">JuiceSort Hub Screen Mockup v2</div>
<div class="phone-frame">
  <div class="screen">
    <!-- Sparkles -->
    <div class="glow-spark gs1"></div><div class="glow-spark gs2"></div>
    <div class="glow-spark gs3"></div><div class="glow-spark gs4"></div>
    <div class="glow-spark gs5"></div><div class="glow-spark gs6"></div>
    <div class="glow-spark gs7"></div><div class="glow-spark gs8"></div>
    <div class="glow-spark gs9"></div>

    <!-- Bokeh -->
    <div class="bokeh b1"></div><div class="bokeh b2"></div><div class="bokeh b3"></div>

    <!-- Bubbles -->
    <div class="bubble bu1"></div><div class="bubble bu2"></div><div class="bubble bu3"></div>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="coin-display">
        <div class="coin-icon">$</div>
        <span class="coin-amount">1,250</span>
      </div>
      <div class="settings-btn">&#9881;&#65039;</div>
    </div>

    <!-- Roadmap button -->
    <div class="roadmap-btn">&#127757;</div>

    <!-- Center -->
    <div class="center-area">
      <div class="scene-title">Next Destination</div>
      <div class="city-name">Istanbul, Turkey</div>

      <div class="scene-bottles">
        <div class="scene-bottle"><div class="sl"></div><div class="bsp"></div></div>
        <div class="scene-bottle"><div class="sl"></div><div class="bsp"></div></div>
        <div class="scene-bottle"><div class="sl"></div><div class="bsp"></div></div>
        <div class="scene-bottle"><div class="sl"></div><div class="bsp"></div></div>
      </div>

      <!-- PLAY BUTTON -->
      <div class="play-wrapper">
        <div class="play-glow"></div>
        <div class="play-button">
          <div class="btn-spark bks1"></div>
          <div class="btn-spark bks2"></div>
          <div class="btn-spark bks3"></div>
          <div class="btn-spark bks4"></div>
          <span class="play-text">Level 24</span>
        </div>
      </div>

      <div class="tap-hint">TAP ANYWHERE FOR ROADMAP</div>
    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <div class="nav-item">
        <div class="nav-icon">&#127942;<span class="soon-badge">SOON</span></div>
        <span class="nav-label">Rewards</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon">&#128176;<span class="soon-badge">SOON</span></div>
        <span class="nav-label">Shop</span>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">&#127968;</div>
        <span class="nav-label">Home</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon">&#127775;<span class="soon-badge">SOON</span></div>
        <span class="nav-label">Events</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon">&#128100;<span class="soon-badge">SOON</span></div>
        <span class="nav-label">Profile</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
