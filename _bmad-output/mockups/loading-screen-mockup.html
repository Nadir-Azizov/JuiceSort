<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JuiceSort Loading Screen Mockup v4</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #111; font-family: 'Fredoka', sans-serif;
  }
  .phone-frame {
    width: 360px; height: 780px; border-radius: 40px;
    overflow: hidden; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 3px solid #333;
  }
  .screen {
    width: 100%; height: 100%;
    background: linear-gradient(180deg,
      #0f0825 0%, #1c0e38 15%, #2e1755 32%, #4a2272 46%,
      #7a3068 58%, #b84a3a 70%, #e86830 80%, #ff8844 88%, #ffbb66 100%);
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; position: relative; overflow: hidden;
  }

  /* ========== WARM AMBIENT ========== */
  .screen::before {
    content: ''; position: absolute;
    bottom: -20%; left: -20%; width: 140%; height: 60%;
    background: radial-gradient(ellipse, rgba(255,150,50,0.18) 0%, transparent 60%);
    animation: warmGlow 5s ease-in-out infinite;
  }
  @keyframes warmGlow {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.06); }
  }

  /* ========== FULL CUPBOARD BACKGROUND ========== */
  .cupboard {
    position: absolute; top: 0; left: 0; right: 0; height: 58%; z-index: 0;
  }
  /* Back wall texture */
  .cupboard::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(90deg, rgba(80,50,30,0.06) 0px, transparent 1px, transparent 40px),
      repeating-linear-gradient(0deg, rgba(80,50,30,0.04) 0px, transparent 1px, transparent 40px),
      linear-gradient(180deg, rgba(60,30,15,0.25) 0%, rgba(40,20,10,0.15) 100%);
  }
  /* Side panels */
  .cup-side {
    position: absolute; top: 0; bottom: 0; width: 7%;
    background: linear-gradient(90deg, #5a3a22, #4a2e1a);
    box-shadow: inset -3px 0 8px rgba(0,0,0,0.3);
  }
  .cup-side.left { left: 0; }
  .cup-side.right { right: 0; transform: scaleX(-1); }
  /* Top header */
  .cup-top {
    position: absolute; top: 0; left: 0; right: 0; height: 4%;
    background: linear-gradient(180deg, #6b4a2e 0%, #5a3a22 100%);
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    border-radius: 0 0 4px 4px;
    z-index: 1;
  }
  .cup-top::after {
    content: ''; position: absolute; bottom: -3px; left: 10%; right: 10%; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(200,160,100,0.3), transparent);
  }

  /* Shelves */
  .shelf {
    position: absolute; left: 7%; right: 7%; height: 7px;
    background: linear-gradient(180deg, #9b7a4e 0%, #7a5a35 40%, #5a4025 100%);
    border-radius: 2px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 1px 0 rgba(220,180,120,0.25);
    z-index: 2;
  }
  .shelf::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 5%, rgba(255,220,160,0.3) 50%, transparent 95%);
    border-radius: 2px;
  }
  .shelf-1 { top: 20%; }
  .shelf-2 { top: 42%; }

  /* Brackets */
  .bracket {
    position: absolute; width: 8px; z-index: 1;
    background: linear-gradient(90deg, #7a5a35, #5a4025);
    border-radius: 0 0 2px 2px;
  }
  .br1 { top: calc(20% + 7px); left: 14%; height: 16px; }
  .br2 { top: calc(20% + 7px); right: 14%; height: 16px; }
  .br3 { top: calc(42% + 7px); left: 14%; height: 16px; }
  .br4 { top: calc(42% + 7px); right: 14%; height: 16px; }
  .br5 { top: calc(20% + 7px); left: 50%; height: 14px; }
  .br6 { top: calc(42% + 7px); left: 50%; height: 14px; }

  /* Shelf warm glow */
  .shelfglow {
    position: absolute; left: 10%; right: 10%; height: 25px;
    background: radial-gradient(ellipse, rgba(255,200,100,0.1) 0%, transparent 70%);
    z-index: 0;
  }
  .sg1 { top: 15%; }
  .sg2 { top: 37%; }

  /* ========== SHELF ITEMS (cute, sweet, detailed) ========== */

  /* -- Cocktail glass (top shelf, left) -- */
  .cocktail { position: absolute; top: 8%; left: 12%; z-index: 3; }
  .cocktail .glass {
    width: 32px; height: 40px;
    background: linear-gradient(135deg, rgba(255,130,180,0.45), rgba(255,80,140,0.25));
    border: 2px solid rgba(255,200,220,0.45);
    border-radius: 2px 2px 14px 14px;
    position: relative; overflow: hidden;
  }
  .cocktail .liq { position: absolute; bottom: 0; left: 0; right: 0; height: 72%;
    background: linear-gradient(180deg, #ff7ec4 0%, #ff3d8a 100%);
    border-radius: 0 0 12px 12px; }
  .cocktail .liq::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: rgba(255,255,255,0.2); border-radius: 50%; }
  .cocktail .straw { position: absolute; top: -14px; right: 6px; width: 3px; height: 32px;
    background: linear-gradient(180deg, #ff6699, #ff3366); border-radius: 2px; transform: rotate(12deg); }
  .cocktail .umbrella { position: absolute; top: -18px; right: 0px; width: 20px; height: 11px;
    background: linear-gradient(180deg, #ffdd44, #ffbb00); border-radius: 11px 11px 0 0;
    border: 1px solid rgba(200,150,0,0.5); }
  .cocktail .cherry { position: absolute; top: -7px; left: 5px; width: 9px; height: 9px;
    background: radial-gradient(circle at 35% 35%, #ff5577, #cc0033); border-radius: 50%;
    box-shadow: 0 0 4px rgba(255,50,80,0.4); }
  .cocktail .cherry-stem { position: absolute; top: -12px; left: 8px; width: 2px; height: 7px;
    background: #55aa33; border-radius: 1px; transform: rotate(-10deg); }
  .cocktail .stem { width: 4px; height: 14px;
    background: linear-gradient(180deg, rgba(255,200,220,0.35), rgba(255,200,220,0.15));
    margin: 0 auto; border-radius: 2px; }
  .cocktail .base { width: 24px; height: 4px;
    background: rgba(255,200,220,0.3); border-radius: 2px; margin: 0 auto; }
  .cocktail .sparkle { position: absolute; width: 6px; height: 6px;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
    border-radius: 50%; animation: sparkPop 2s ease-in-out infinite; }
  .cocktail .sparkle.sp-a { top: 5px; left: 3px; animation-delay: 0.5s; }
  .cocktail .sparkle.sp-b { top: 15px; right: 5px; animation-delay: 1.2s; }

  /* -- Wine bottle (top shelf, center-left) -- */
  .wine { position: absolute; top: 3.5%; left: 33%; z-index: 3; }
  .wine .cork { width: 9px; height: 7px; background: linear-gradient(135deg, #d4b87a, #a08050);
    border-radius: 2px; margin: 0 auto -1px; }
  .wine .neck { width: 11px; height: 20px;
    background: linear-gradient(135deg, rgba(130,30,60,0.65), rgba(80,15,40,0.55));
    border: 1.5px solid rgba(180,80,100,0.4); border-radius: 4px 4px 0 0; margin: 0 auto; }
  .wine .body { width: 26px; height: 52px;
    background: linear-gradient(135deg, rgba(140,35,70,0.6), rgba(90,18,45,0.5));
    border: 1.5px solid rgba(200,100,130,0.35); border-radius: 4px 4px 10px 10px;
    position: relative; overflow: hidden; }
  .wine .wfill { position: absolute; bottom: 0; left: 0; right: 0; height: 80%;
    background: linear-gradient(180deg, #a01860 0%, #5a0e35 100%);
    border-radius: 0 0 8px 8px; }
  .wine .label { position: absolute; top: 28%; left: 12%; right: 12%; height: 32%;
    background: rgba(255,240,220,0.55); border-radius: 2px; }
  .wine .label::after { content: ''; position: absolute; top: 30%; left: 20%; right: 20%; height: 2px;
    background: rgba(140,35,70,0.3); }
  .wine .shine { position: absolute; top: 5px; left: 3px; width: 4px; height: 60%;
    background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent); border-radius: 2px; }

  /* -- Mason jar (top shelf, center-right) -- */
  .mason { position: absolute; top: 5%; left: 52%; z-index: 3; }
  .mason .lid { width: 26px; height: 6px;
    background: linear-gradient(180deg, #aaa, #888); border-radius: 3px; margin: 0 auto -1px; }
  .mason .jar { width: 24px; height: 42px;
    background: linear-gradient(135deg, rgba(255,220,100,0.3), rgba(255,180,50,0.15));
    border: 2px solid rgba(255,220,130,0.4); border-radius: 3px 3px 8px 8px;
    position: relative; overflow: hidden; }
  .mason .mfill { position: absolute; bottom: 0; left: 0; right: 0; height: 85%;
    background: linear-gradient(180deg, #ffcc55 0%, #ff9922 100%);
    border-radius: 0 0 6px 6px; }
  .mason .mfill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.25); border-radius: 50%; }
  .mason .sparkle { position: absolute; width: 5px; height: 5px;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 70%);
    border-radius: 50%; animation: sparkPop 2.5s ease-in-out infinite 0.8s; top: 8px; left: 5px; }

  /* -- Juice jug (top shelf, right) -- */
  .jug { position: absolute; top: 4%; right: 12%; z-index: 3; }
  .jug .spout { width: 10px; height: 8px;
    background: rgba(255,150,80,0.35); border: 1.5px solid rgba(255,180,100,0.4);
    border-radius: 4px 4px 0 0; margin: 0 auto; }
  .jug .jbody { width: 30px; height: 48px;
    background: linear-gradient(135deg, rgba(255,160,80,0.3), rgba(255,120,40,0.2));
    border: 2px solid rgba(255,180,100,0.35); border-radius: 6px 6px 14px 14px;
    position: relative; overflow: hidden; }
  .jug .jfill { position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
    background: linear-gradient(180deg, #ffbb44 0%, #ff8811 100%);
    border-radius: 0 0 12px 12px; }
  .jug .handle { position: absolute; top: 8px; right: -10px; width: 10px; height: 26px;
    border: 2px solid rgba(255,180,100,0.35); border-left: none;
    border-radius: 0 8px 8px 0; }
  .jug .orange { position: absolute; top: -6px; left: 6px; width: 16px; height: 8px;
    background: radial-gradient(ellipse at 50% 80%, #ffaa33, #ff8811);
    border-radius: 16px 16px 0 0; border: 1.5px solid #ee7700; }

  /* -- Smoothie (bottom shelf, left) -- */
  .smoothie { position: absolute; top: 30%; left: 13%; z-index: 3; }
  .smoothie .lid { width: 28px; height: 5px;
    background: rgba(100,230,180,0.5); border-radius: 3px; margin: 0 auto -1px; }
  .smoothie .cup { width: 24px; height: 34px;
    background: linear-gradient(135deg, rgba(80,220,160,0.35), rgba(50,180,130,0.2));
    border: 2px solid rgba(120,230,190,0.4); border-radius: 3px 3px 10px 10px;
    position: relative; overflow: hidden; }
  .smoothie .sfill { position: absolute; bottom: 0; left: 0; right: 0; height: 88%;
    background: linear-gradient(180deg, #77eeaa 0%, #33bb77 50%, #22aa66 100%);
    border-radius: 0 0 8px 8px; }
  .smoothie .sfill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.2); border-radius: 50%; }
  .smoothie .sstraw { position: absolute; top: -15px; left: 9px; width: 3px; height: 30px;
    background: linear-gradient(180deg, #55dd88, #33aa66); border-radius: 2px; }
  .smoothie .leaf { position: absolute; top: -10px; left: 14px; width: 9px; height: 5px;
    background: #55cc55; border-radius: 0 8px 0 8px; transform: rotate(-20deg); }
  .smoothie .sparkle { position: absolute; width: 5px; height: 5px;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
    border-radius: 50%; animation: sparkPop 2s ease-in-out infinite 1.5s; top: 5px; right: 3px; }

  /* -- Squeezer (bottom shelf, center-left) -- */
  .squeezer { position: absolute; top: 29%; left: 35%; z-index: 3; }
  .squeezer .cone { width: 18px; height: 14px;
    background: radial-gradient(circle at 50% 80%, #ffee66, #ffcc33);
    border-radius: 50% 50% 4px 4px; margin: 0 auto -2px;
    border: 1.5px solid rgba(255,200,50,0.5); }
  .squeezer .sbody { width: 30px; height: 32px;
    background: linear-gradient(135deg, rgba(255,220,100,0.4), rgba(240,180,50,0.3));
    border: 2px solid rgba(255,220,100,0.5); border-radius: 8px 8px 6px 6px;
    position: relative; overflow: hidden; }
  .squeezer .sjuice { position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
    background: linear-gradient(180deg, #ffdd55 0%, #ffaa22 100%);
    border-radius: 0 0 4px 4px; }
  .squeezer .lemon { position: absolute; top: -5px; left: 5px; width: 16px; height: 8px;
    background: linear-gradient(180deg, #fff566, #ffdd33);
    border-radius: 16px 16px 0 0; border: 1px solid #ddcc22; }
  .squeezer .shandle { position: absolute; top: 6px; right: -9px; width: 9px; height: 4px;
    background: rgba(255,220,100,0.5); border-radius: 0 3px 3px 0; }
  .squeezer .spout2 { position: absolute; bottom: 4px; left: -6px; width: 8px; height: 3px;
    background: rgba(255,220,100,0.4); border-radius: 3px 0 0 3px; }

  /* -- Tall berry bottle (bottom shelf, center-right) -- */
  .berry { position: absolute; top: 26%; left: 55%; z-index: 3; }
  .berry .bcap { width: 10px; height: 5px;
    background: linear-gradient(180deg, #cc66aa, #aa4488); border-radius: 3px 3px 0 0; margin: 0 auto -1px; }
  .berry .bneck { width: 8px; height: 14px;
    background: rgba(180,80,140,0.4); border: 1.5px solid rgba(200,100,160,0.4);
    border-radius: 3px 3px 0 0; margin: 0 auto; }
  .berry .bbody { width: 22px; height: 42px;
    background: linear-gradient(135deg, rgba(180,80,140,0.35), rgba(140,40,100,0.2));
    border: 1.5px solid rgba(200,100,160,0.35); border-radius: 4px 4px 8px 8px;
    position: relative; overflow: hidden; }
  .berry .bfill { position: absolute; bottom: 0; left: 0; right: 0; height: 75%;
    background: linear-gradient(180deg, #cc44aa 0%, #8c1459 100%);
    border-radius: 0 0 6px 6px; }
  .berry .blabel { position: absolute; top: 25%; left: 10%; right: 10%; height: 30%;
    background: rgba(255,230,240,0.45); border-radius: 2px; }
  .berry .bshine { position: absolute; top: 4px; left: 3px; width: 3px; height: 55%;
    background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent); border-radius: 2px; }

  /* -- Tropical bottle (bottom shelf, right) -- */
  .tropical { position: absolute; top: 28%; right: 12%; z-index: 3; }
  .tropical .tneck { width: 8px; height: 10px;
    background: rgba(255,100,60,0.35); border: 1.5px solid rgba(255,130,80,0.4);
    border-radius: 3px 3px 0 0; margin: 0 auto; }
  .tropical .tbody { width: 24px; height: 40px;
    background: linear-gradient(135deg, rgba(255,100,60,0.3), rgba(255,60,30,0.2));
    border: 1.5px solid rgba(255,130,80,0.35); border-radius: 4px 4px 10px 10px;
    position: relative; overflow: hidden; }
  .tropical .tfill { position: absolute; bottom: 0; left: 0; right: 0; height: 72%;
    background: linear-gradient(180deg, #ff7744 0%, #ee3322 100%);
    border-radius: 0 0 8px 8px; }
  .tropical .tlabel { position: absolute; top: 22%; left: 10%; right: 10%; height: 32%;
    background: rgba(255,240,220,0.4); border-radius: 2px; }
  .tropical .pine { position: absolute; top: -9px; right: 1px; width: 7px; height: 9px;
    background: #ffcc33; border-radius: 2px; }
  .tropical .pleaf { position: absolute; top: -14px; right: 0px; width: 10px; height: 6px;
    background: #44bb33; border-radius: 0 5px 0 5px; transform: rotate(8deg); }

  /* Sparkle animation */
  @keyframes sparkPop {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ========== FLOATING SPARKLES (extra shine everywhere) ========== */
  .glow-spark {
    position: absolute; border-radius: 50%; z-index: 2;
    animation: glowFloat ease-in-out infinite;
  }
  .glow-spark::before, .glow-spark::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.9); border-radius: 1px;
  }
  .glow-spark::before { width: 2px; height: 100%; left: calc(50% - 1px); top: 0; }
  .glow-spark::after { width: 100%; height: 2px; top: calc(50% - 1px); left: 0; }

  .gs1 { width: 10px; height: 10px; top: 12%; left: 28%; animation-duration: 3s; animation-delay: 0.3s; }
  .gs2 { width: 8px; height: 8px; top: 8%; right: 25%; animation-duration: 2.5s; animation-delay: 1s; }
  .gs3 { width: 12px; height: 12px; top: 35%; left: 18%; animation-duration: 3.5s; animation-delay: 0.8s; }
  .gs4 { width: 7px; height: 7px; top: 32%; right: 20%; animation-duration: 2.8s; animation-delay: 1.8s; }
  .gs5 { width: 9px; height: 9px; top: 48%; left: 40%; animation-duration: 3.2s; animation-delay: 0.5s; }
  .gs6 { width: 6px; height: 6px; top: 55%; right: 30%; animation-duration: 2.2s; animation-delay: 2.2s; }
  .gs7 { width: 10px; height: 10px; top: 65%; left: 22%; animation-duration: 3s; animation-delay: 1.5s; }
  .gs8 { width: 8px; height: 8px; top: 72%; right: 18%; animation-duration: 2.8s; animation-delay: 0.2s; }

  @keyframes glowFloat {
    0%,100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    30% { opacity: 0.9; transform: scale(1) rotate(20deg); }
    60% { opacity: 0.5; transform: scale(0.8) rotate(40deg); }
  }

  /* ========== BOKEH ========== */
  .bokeh { position: absolute; border-radius: 50%; animation: floatB ease-in-out infinite; z-index: 0; }
  .b1 { width: 120px; height: 120px; top: 58%; left: 5%;
    background: radial-gradient(circle, rgba(255,180,80,0.16) 0%, transparent 70%); animation-duration: 7s; }
  .b2 { width: 80px; height: 80px; top: 68%; right: 8%;
    background: radial-gradient(circle, rgba(200,120,255,0.12) 0%, transparent 70%); animation-duration: 5s; animation-delay: 1.5s; }
  .b3 { width: 100px; height: 100px; bottom: 8%; left: 18%;
    background: radial-gradient(circle, rgba(255,100,150,0.1) 0%, transparent 70%); animation-duration: 8s; animation-delay: 3s; }
  @keyframes floatB {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-15px) scale(1.1); opacity: 0.65; }
  }

  /* ========== BUBBLES ========== */
  .bubble {
    position: absolute; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent);
    animation: rise linear infinite; z-index: 0;
  }
  .bu1 { width: 10px; height: 10px; bottom: -12px; left: 18%; animation-duration: 7s; }
  .bu2 { width: 7px; height: 7px; bottom: -8px; left: 42%; animation-duration: 9s; animation-delay: 2s; }
  .bu3 { width: 12px; height: 12px; bottom: -15px; left: 68%; animation-duration: 8s; animation-delay: 1s; }
  .bu4 { width: 5px; height: 5px; bottom: -6px; left: 85%; animation-duration: 10s; animation-delay: 3s; }
  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.5; } 90% { opacity: 0.2; }
    100% { transform: translateY(-800px) translateX(15px); opacity: 0; }
  }

  /* ========== TITLE ========== */
  .title-area {
    position: relative; z-index: 4;
    margin-top: 48%; margin-bottom: 6px;
    animation: titleIn 1.2s ease-out both; text-align: center;
  }
  @keyframes titleIn {
    0% { opacity: 0; transform: scale(0.5) translateY(40px); }
    50% { transform: scale(1.08) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .title-juice {
    display: block; font-family: 'Baloo 2', sans-serif;
    font-size: 70px; font-weight: 800; color: #ffdd33; line-height: 0.85;
    text-shadow: 0 0 30px rgba(255,220,50,0.6), 0 4px 0 #cc9900, 0 7px 0 #aa7700,
      0 9px 25px rgba(0,0,0,0.5), 2px 2px 0 #cc9900, -1px -1px 0 #ffe866;
    letter-spacing: 5px;
  }
  .title-sort {
    display: block; font-family: 'Baloo 2', sans-serif;
    font-size: 74px; font-weight: 800; color: #fff; line-height: 0.95;
    text-shadow: 0 0 25px rgba(255,255,255,0.35), 0 4px 0 #7755aa, 0 7px 0 #554488,
      0 9px 25px rgba(0,0,0,0.5), 2px 2px 0 #8866bb, -1px -1px 0 rgba(255,255,255,0.5);
    letter-spacing: 7px;
  }
  .title-area::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: titleShine 3s ease-in-out infinite 1.5s;
  }
  @keyframes titleShine { 0% { left: -50%; } 25% { left: 130%; } 100% { left: 130%; } }

  .subtitle {
    font-size: 13px; font-weight: 600; color: rgba(255,225,180,0.5);
    letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; z-index: 4;
    animation: titleIn 1.2s ease-out 0.3s both;
  }

  /* ========== FEATURE BOTTLE (sweeter, rounder) ========== */
  .feature-bottle {
    position: relative; z-index: 4; margin-bottom: 35px;
    animation: titleIn 1.2s ease-out 0.5s both;
    filter: drop-shadow(0 8px 25px rgba(0,0,0,0.4));
  }
  .bottle-cap { width: 38px; height: 9px;
    background: linear-gradient(180deg, #ffdd55 0%, #ee9922 100%);
    border-radius: 6px 6px 0 0; margin: 0 auto -1px;
